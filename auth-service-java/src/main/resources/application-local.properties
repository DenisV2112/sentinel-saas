# Local Development Profile
spring.application.name=auth-service
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/sentinel_db
spring.datasource.username=sentinel
spring.datasource.password=sentinel123
spring.datasource.driver-class-name=org.postgresql.Driver

# Database - Connection Pool (OPTIMIZED: reduced from 5 to 2)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA/Hibernate (OPTIMIZED)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JPA Lazy Bootstrap (OPTIMIZED: added)
spring.jpa.open-in-view=false
spring.data.jpa.repositories.bootstrap-mode=lazy

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=sentinel
spring.rabbitmq.password=sentinel123
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Lazy Initialization (OPTIMIZED: added)
spring.main.lazy-initialization=true

# JWT
jwt.secret=X9q2N8ZCnO3Tj48p1Fk6B2V0x8Teq9gHBV0SX1e2p6U=
jwt.expiration=3600000

# Microservices
services.tenant.url=http://tenant-service:8082
services.user-management.url=http://user-management-service:8083

# Feign Client (timeouts reducidos — llamadas internas deben ser rápidas)
feign.client.config.default.connectTimeout=2000
feign.client.config.default.readTimeout=3000
feign.client.config.user-management-service.connectTimeout=2000
feign.client.config.user-management-service.readTimeout=3000

# CORS - Local Development
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174,http://localhost:8000
app.url=http://localhost:3000

# OAuth2 - Google (Disabled for local development)
spring.security.oauth2.client.registration.google.client-id=disabled
spring.security.oauth2.client.registration.google.client-secret=disabled
spring.security.oauth2.client.registration.google.scope=disabled

# Email (MailHog for local)
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Logging
logging.level.root=INFO
logging.level.com.sentinel.auth=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
# =============================================================================
# Performance optimizations (reduces idle CPU/RAM)
# =============================================================================
# Disable RabbitMQ health polling (Docker healthcheck covers this)
management.health.rabbit.enabled=false
management.health.mail.enabled=false
# Disable OSIV (keeps JPA session open only when needed)
spring.jpa.open-in-view=false
# Disable SQL logging in console
spring.jpa.show-sql=false
# Reduce connection pool (5 per service is plenty for dev)
spring.datasource.hikari.maximum-pool-size=5
