# ===================================
# APPLICATION - Docker Profile
# ===================================
spring.application.name=backend-for-frontend-service
server.port=8080

# Spring Data JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://postgres:5432/sentinel_db
spring.datasource.username=sentinel
spring.datasource.password=sentinel123
spring.datasource.driver-class-name=org.postgresql.Driver

# MongoDB (Docker)
spring.data.mongodb.uri=mongodb://sentinel:sentinel123@mongodb:27017/sentinel_bff_cache?authSource=admin
spring.data.mongodb.auto-index-creation=true

# RabbitMQ (Docker)
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=sentinel
spring.rabbitmq.password=sentinel123

# Feign Clients (Docker internal URLs)
app.services.orchestrator-url=http://scaner-orchestrator-service:8086
app.services.tenant-url=http://tenant-service:8082
app.services.project-url=http://project-service:8083
app.services.auth-url=http://auth-service:8081
app.services.results-aggregator-url=http://results-aggregator-service:8087
app.services.user-management-url=http://user-management-service:8083
app.services.billing-url=http://billing-service:8084

# Feign Circuit Breaker (Resilience4j)
feign.circuitbreaker.enabled=true

# Resilience4j Circuit Breakers — protects BFF from cascading failures
# Design: 50% failure threshold, 10s open state, 10-call sliding window
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.tenant-service.base-config=default
resilience4j.circuitbreaker.instances.billing-service.base-config=default
resilience4j.circuitbreaker.instances.project-client.base-config=default
resilience4j.circuitbreaker.instances.orchestrator-client.base-config=default
resilience4j.circuitbreaker.instances.results-aggregator-client.base-config=default
resilience4j.circuitbreaker.instances.scan-orchestrator-service.base-config=default

# Security
security.jwt.secret=X9q2N8ZCnO3Tj48p1Fk6B2V0x8Teq9gHBV0SX1e2p6U=
security.jwt.expiration=3600000

# Logging
logging.level.root=INFO
logging.level.com.sentinel=DEBUG
logging.level.org.springframework.security=INFO

# Server settings
server.error.include-message=always
server.error.include-stacktrace=never

# Jackson serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
