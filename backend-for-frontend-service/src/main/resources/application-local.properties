# Local Development Profile
spring.application.name=backend-for-frontend-service
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/sentinel_db
spring.datasource.username=sentinel
spring.datasource.password=sentinel123
spring.datasource.driver-class-name=org.postgresql.Driver

# Database - Connection Pool (OPTIMIZED)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000

# JPA/Hibernate (OPTIMIZED: fixed duplicates)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.data.jpa.repositories.bootstrap-mode=lazy

# MongoDB Cache
spring.data.mongodb.uri=mongodb://sentinel:sentinel123@mongodb:27017/sentinel_bff_cache?authSource=admin

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=sentinel
spring.rabbitmq.password=sentinel123

# Service URLs (Internal)
services.auth.url=http://auth-service:8081
services.tenant.url=http://tenant-service:8082
services.project.url=http://project-service:8083
services.billing.url=http://billing-service:8084
app.services.user-management-url=http://user-management-service:8083

# Lazy Initialization (OPTIMIZED: added)
spring.main.lazy-initialization=true