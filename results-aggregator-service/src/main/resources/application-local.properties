# Local Development Profile
spring.application.name=results-aggregator-service
server.port=8087

# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/sentinel_db
spring.datasource.username=sentinel
spring.datasource.password=sentinel123
spring.datasource.driver-class-name=org.postgresql.Driver

# Database - Connection Pool (OPTIMIZED)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000

# JPA/Hibernate (OPTIMIZED)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.data.jpa.repositories.bootstrap-mode=lazy

# MongoDB
spring.data.mongodb.uri=mongodb://sentinel:sentinel123@mongodb:27017/sentinel_db?authSource=admin

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=sentinel
spring.rabbitmq.password=sentinel123

# Lazy Initialization (OPTIMIZED: added)
spring.main.lazy-initialization=true

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174

# Logging
logging.level.root=INFO

# Actuator
management.endpoints.web.exposure.include=health,info