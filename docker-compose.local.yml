version: '3.8'

# =============================================================================
# Logging anchors ΓÇö referenced by all services via YAML merge
# =============================================================================
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-infra-logging: &infra-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "1"

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sentinel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - sentinel-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: sentinel-mongodb
    restart: unless-stopped
    command: ["--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: sentinel
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sentinel-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: sentinel
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # MailHog ΓÇö SMTP mock for email testing
  mailhog:
    image: mailhog/mailhog
    container_name: sentinel-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    networks:
      - sentinel-network

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: sentinel-n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=America/Bogota
      - NODE_OPTIONS="--max-old-space-size=256"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel-network

  # ===========================================================================
  # KONG API GATEWAY
  # ===========================================================================

  kong-db:
    image: postgres:13-alpine
    container_name: sentinel-kong-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong123
      POSTGRES_DB: kong
    ports:
      - "5433:5432"
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - sentinel-network

  kong-migration:
    image: kong:alpine
    container_name: sentinel-kong-migration-local
    restart: "no"
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong123
    depends_on:
      kong-db:
        condition: service_healthy
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel-network

  kong:
    image: kong:alpine
    container_name: sentinel-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong123
      # Silence access logs ΓÇö they're noise in local dev
      KONG_PROXY_ACCESS_LOG: /dev/null
      KONG_ADMIN_ACCESS_LOG: /dev/null
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./API-Gateway/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8001/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel-network

  # Konga DB ΓÇö PostgreSQL 11 for Konga (pg driver v7 needs PG11's r.consrc column)
  konga-db:
    image: postgres:11-alpine
    container_name: sentinel-konga-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong123
      POSTGRES_DB: konga
    ports:
      - "5434:5432"
    volumes:
      - konga_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d konga"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *infra-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel-network

  # Konga ΓÇö Kong Admin UI
  konga:
    image: pantsel/konga:latest
    container_name: sentinel-konga
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_ADAPTER: postgres
      DB_HOST: konga-db
      DB_USER: kong
      DB_PASSWORD: kong123
      DB_DATABASE: konga
    volumes:
      - ./.sailsrc-konga:/app/.sailsrc:ro
    ports:
      - "1337:1337"
    depends_on:
      konga-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:1337/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel-network

  # ===========================================================================
  # JAVA MICROSERVICES
  # ===========================================================================

  # Auth Service
  auth-service:
    build:
      context: ./auth-service-java
      dockerfile: Dockerfile
    container_name: sentinel-auth-service
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: http://localhost:3000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174
      # Mail (MailHog)
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: test
      SPRING_MAIL_PASSWORD: test
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "false"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Tenant Service
  tenant-service:
    build:
      context: ./tenant-service
      dockerfile: Dockerfile
    container_name: sentinel-tenant-service
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Project Service
  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile
    container_name: sentinel-project-service
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # User Management Service
  user-management-service:
    build:
      context: ./user-management-service
      dockerfile: Dockerfile
    container_name: sentinel-user-management-service
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
      # Mail (MailHog)
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: test
      SPRING_MAIL_PASSWORD: test
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "false"
    ports:
      - "8088:8083"   # External:Internal ΓÇö app listens on 8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Backend for Frontend (BFF)
  backend-for-frontend-service:
    build:
      context: ./backend-for-frontend-service
      dockerfile: Dockerfile
    container_name: sentinel-bff-service
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      SPRING_DATA_MONGODB_URI: mongodb://sentinel:${MONGO_PASSWORD}@mongodb:27017/sentinel_bff_cache?authSource=admin
      # Service URLs (kebab-case for APP_SERVICES, underscore for legacy SERVICES)
      APP_SERVICES_AUTH-URL: http://auth-service:8081
      APP_SERVICES_TENANT-URL: http://tenant-service:8082
      APP_SERVICES_PROJECT-URL: http://project-service:8083
      APP_SERVICES_BILLING-URL: http://billing-service:8084
      SERVICES_AUTH_URL: http://auth-service:8081
      SERVICES_TENANT_URL: http://tenant-service:8082
      SERVICES_PROJECT_URL: http://project-service:8083
      SERVICES_BILLING_URL: http://billing-service:8084
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Billing Service
  billing-service:
    build:
      context: ./Billings
      dockerfile: Dockerfile
    container_name: sentinel-billing
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      SERVER_PORT: 8084
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: http://localhost:3000
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Results Aggregator Service
  results-aggregator-service:
    build:
      context: ./results-aggregator-service
      dockerfile: Dockerfile
    container_name: sentinel-results-aggregator
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATA_MONGODB_URI: mongodb://sentinel:${MONGO_PASSWORD}@mongodb:27017/sentinel_db?authSource=admin
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8087/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Scaner Orchestrator Service
  scaner-orchestrator-service:
    build:
      context: ./scaner-orchestrator-service
      dockerfile: Dockerfile
    container_name: sentinel-scaner-orchestrator
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_CONNECTTIMEOUT: "5000"
      SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_DEFAULT_READTIMEOUT: "10000"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinel_db
      SPRING_DATASOURCE_USERNAME: sentinel
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: sentinel
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # ===========================================================================
  # .NET (C#) MICROSERVICES
  # ===========================================================================

  # Security Gate Service
  security-gate-service:
    build:
      context: ./Sentinel.SeurityGate.Service
      dockerfile: Dockerfile
    container_name: sentinel-security-gate
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=sentinel_db;User Id=sentinel;Password=${DB_PASSWORD};"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Username: sentinel
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Code Quality Service (worker ΓÇö no HTTP API, only RabbitMQ)
  code-quality-service:
    build:
      context: ./Sentinel.CodeQuality.Service
      dockerfile: Dockerfile
    container_name: sentinel-code-quality
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=sentinel_db;User Id=sentinel;Password=${DB_PASSWORD};"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Username: sentinel
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5002:5001"   # All C# services use 5001 internally
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # Vulnerability Service (worker ΓÇö no HTTP API, only RabbitMQ)
  vulnerability-service:
    build:
      context: ./Sentinel.Vulnerability.Service
      dockerfile: Dockerfile
    container_name: sentinel-vulnerability
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=sentinel_db;User Id=sentinel;Password=${DB_PASSWORD};"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Username: sentinel
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5003:5001"   # All C# services use 5001 internally
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 448M
    networks:
      - sentinel-network

  # ===========================================================================
  # FRONTEND
  # ===========================================================================

  sentinel-front:
    build:
      context: ./sentinel_front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_MERCADOPAGO_PUBLIC_KEY: TEST-d92e22d6-5649-4b85-8283-54422ff420a5
    container_name: sentinel-front
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_MERCADOPAGO_PUBLIC_KEY: TEST-d92e22d6-5649-4b85-8283-54422ff420a5
    volumes:
      # Use local-friendly nginx config (no HSTS, permissive CSP)
      - ./sentinel_front/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - sentinel-network

